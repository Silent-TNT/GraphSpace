name: Deploy Website

on:
  push:
    branches: [main, master]
    paths:
      - "website/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/qc-viewer/package-lock.json

      - name: Build search index
        working-directory: website
        run: node scripts/build-search-index.mjs

      - name: Build dataset viewer (demo mode)
        working-directory: website/qc-viewer
        run: |
          npm ci
          npm run build:demo

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - id: deployment
        uses: actions/deploy-pages@v4
